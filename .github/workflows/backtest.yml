name: Backtest

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install packages
      run: |
        pip install ccxt pandas numpy

    - name: Run backtest
      run: |
        python backtest_v4.py
